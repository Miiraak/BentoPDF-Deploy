events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    types {
        application/javascript mjs;
    }

    sendfile   on;
    tcp_nopush on;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    server_tokens off;

    map $host $validated_host {
        ~^[a-zA-Z0-9.-]+(:[0-9]+)?$ $host;
        default "";
    }

    map $uri $localized_page_uri {
        ~^/(?:ar|be|da|ru|de|es|fr|id|it|nl|pt|sv|tr|vi|zh-TW|zh|ko|ja|uk|en)/(.+)$  /$1;
        default  $uri;
    }

    server {
        listen 80;
        server_name _;

        if ($validated_host = "") {
            return 444;
        }
        return 301 https://$validated_host:${HTTPS_PORT}$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        location = /config.json {
            try_files $uri =404;
            default_type application/json;
            expires -1;
            add_header Cache-Control "no-store" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        location ^~ /wasm/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        location = /libreoffice-wasm/soffice.wasm.gz {
            try_files $uri =404;
            gzip off;
            types { }
            default_type application/wasm;
            add_header Content-Encoding "gzip" always;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        location = /libreoffice-wasm/soffice.data.gz {
            try_files $uri =404;
            gzip off;
            types { }
            default_type application/octet-stream;
            add_header Content-Encoding "gzip" always;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        location ~* \.(js|mjs|css|woff|woff2|ttf|eot|otf|png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        location ~* \.html$ {
            try_files $localized_page_uri $uri =404;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy   "same-origin"  always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }
    }
}
